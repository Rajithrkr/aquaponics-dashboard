<!DOCTYPE html>
<html>

<head>

<title>Smart Aquaponics Dashboard</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="app.js" defer></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
padding:0;
}

h1{
margin-top:20px;
}

.section{
margin-top:30px;
}

.card{
background:#1e293b;
padding:20px;
margin:10px;
border-radius:10px;
display:inline-block;
width:200px;
font-size:18px;
}

button{
padding:12px;
margin:8px;
font-size:15px;
cursor:pointer;
border-radius:8px;
border:none;
background:#38bdf8;
color:black;
font-weight:bold;
}

button:hover{
background:#0ea5e9;
}

.control-panel{
margin-top:20px;
}

img{
width:320px;
border-radius:10px;
margin-top:10px;
border:3px solid #1e293b;
}

</style>

</head>

<body>

<h1>🌱 Smart Aquaponics System</h1>


<!-- SENSOR DATA -->

<div class="section">

<h2>Sensor Data</h2>

<div class="card">
Temperature<br>
<span id="temperature">--</span>
</div>

<div class="card">
pH<br>
<span id="ph">--</span>
</div>

<div class="card">
TDS<br>
<span id="tds">--</span>
</div>

<div class="card">
EC<br>
<span id="ec">--</span>
</div>

<div class="card">
Water Tank 1<br>
<span id="water1">--</span>
</div>

<div class="card">
Water Tank 2<br>
<span id="water2">--</span>
</div>

<div class="card">
Water Tank 3<br>
<span id="water3">--</span>
</div>

</div>



<!-- DISEASE DETECTION -->

<div class="section">

<h2>Disease Detection</h2>

<p>
Disease :
<strong><span id="disease">--</span></strong>
</p>

<p>
Confidence :
<strong><span id="confidence">--</span></strong>
</p>

<img id="plantImage" src="" alt="Plant Image">

</div>



<!-- PUMP CONTROL -->

<div class="section control-panel">

<h2>Pump Control</h2>

<button onclick="pump2On()">Fertilizer ON</button>
<button onclick="pump2Off()">Fertilizer OFF</button>

<button onclick="pump1On()">Pesticide ON</button>
<button onclick="pump1Off()">Pesticide OFF</button>

</div>



<!-- SYSTEM CONTROL -->

<div class="section">

<h2>System Control</h2>

<button onclick="shutdownPi()" style="background:#ef4444;color:white;">
Shutdown Raspberry Pi
</button>

</div>

</body>
</html>
