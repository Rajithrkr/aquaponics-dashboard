<!DOCTYPE html>
<html>

<head>

<title>Smart Aquaponics Dashboard</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="app.js" defer></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.card{
background:#1e293b;
padding:20px;
margin:10px;
border-radius:10px;
display:inline-block;
width:200px;
font-size:20px;
}

button{
padding:12px;
margin:10px;
font-size:16px;
cursor:pointer;
border-radius:8px;
border:none;
}

img{
width:320px;
border-radius:10px;
margin-top:10px;
}

</style>

</head>

<body>

<h1>🌱 Smart Aquaponics System</h1>

<h2>Sensor Data</h2>

<div class="card">Temperature<br><span id="temperature">--</span></div>
<div class="card">pH<br><span id="ph">--</span></div>
<div class="card">TDS<br><span id="tds">--</span></div>
<div class="card">EC<br><span id="ec">--</span></div>

<div class="card">Water Tank 1<br><span id="water1">--</span></div>
<div class="card">Water Tank 2<br><span id="water2">--</span></div>
<div class="card">Water Tank 3<br><span id="water3">--</span></div>

<h2>Disease Detection</h2>

<p>Disease: <span id="disease">--</span></p>
<p>Confidence: <span id="confidence">--</span></p>

<img id="plantImage">

<h2>Pump Control</h2>

<button onclick="pump1On()">Pesticide ON</button>
<button onclick="pump1Off()">Pesticide OFF</button>

<button onclick="pump2On()">Fertilizer ON</button>
<button onclick="pump2Off()">Fertilizer OFF</button>

</body>
</html>
